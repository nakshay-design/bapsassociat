kind = "web"
previewPath = "/"
title = "BAP & Associates"
version = "1.0.0"
id = "artifacts/bap-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23231
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bap-website run dev"

[services.env]
PORT = "23231"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bap-website", "run", "build"]
publicDir = "artifacts/bap-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
